name: Build OpenClaw ZH

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "24.x"
  PNPM_VERSION: "10.23.0"
  UPSTREAM_REPO: openclaw/openclaw

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          check-latest: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Clone upstream main
        id: upstream
        run: |
          git clone --depth=1 https://github.com/${{ env.UPSTREAM_REPO }}.git openclaw
          echo "ref=main" >> "$GITHUB_OUTPUT"
          echo "sha=$(git -C openclaw rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p 'require(\"./openclaw/package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Resolve pnpm store path
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('openclaw/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Validate translation rules
        run: node scripts/validate-translations.mjs --upstream ./openclaw

      - name: Apply translation patch
        id: apply
        shell: bash
        run: |
          OUTPUT="$(node cli/index.mjs apply --target=./openclaw 2>&1)"
          echo "$OUTPUT"

          STATS_LINE="$(echo "$OUTPUT" | grep -o '##STATS##[^#]*##' | head -1 || true)"
          APPLIED="$(echo "$STATS_LINE" | grep -o 'applied=[0-9]*' | cut -d= -f2)"
          EXISTED="$(echo "$STATS_LINE" | grep -o 'existed=[0-9]*' | cut -d= -f2)"
          FAILED="$(echo "$STATS_LINE" | grep -o 'failed=[0-9]*' | cut -d= -f2)"

          [[ ! "$APPLIED" =~ ^[0-9]+$ ]] && APPLIED="0"
          [[ ! "$EXISTED" =~ ^[0-9]+$ ]] && EXISTED="0"
          [[ ! "$FAILED" =~ ^[0-9]+$ ]] && FAILED="0"

          echo "applied=$APPLIED" >> "$GITHUB_OUTPUT"
          echo "existed=$EXISTED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

          if [ "$FAILED" != "0" ]; then
            echo "Translation apply reported $FAILED unmatched replacements."
            exit 1
          fi

      - name: Install upstream dependencies
        working-directory: openclaw
        shell: bash
        run: |
          pnpm install --frozen-lockfile --ignore-scripts=false --config.engine-strict=false --config.enable-pre-post-scripts=true --config.side-effects-cache=true || \
          pnpm install --frozen-lockfile --ignore-scripts=false --config.engine-strict=false --config.enable-pre-post-scripts=true --config.side-effects-cache=true

      - name: Build OpenClaw
        working-directory: openclaw
        run: pnpm build

      - name: Build Dashboard UI
        working-directory: openclaw
        run: pnpm ui:build

      - name: Archive build output
        id: package
        shell: bash
        run: |
          ARCHIVE_NAME="openclaw-zh-build-${{ steps.upstream.outputs.version }}-${{ steps.upstream.outputs.sha }}.tgz"
          tar \
            --exclude='./node_modules' \
            --exclude='./.git' \
            -czf "$ARCHIVE_NAME" \
            -C openclaw .
          echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-zh-build-${{ steps.upstream.outputs.version }}-${{ steps.upstream.outputs.sha }}
          path: ${{ steps.package.outputs.archive_name }}
          retention-days: 7

      - name: Determine release channel
        if: github.event_name != 'pull_request'
        id: release_meta
        uses: actions/github-script@v7
        env:
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.version }}
        with:
          script: |
            const stableTag = `v${process.env.UPSTREAM_VERSION}`;
            const prereleaseTag = `pre-release`;

            let releaseKind = "release";
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: stableTag,
              });
              releaseKind = "prerelease";
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            core.setOutput("kind", releaseKind);
            core.setOutput("stable_tag", stableTag);
            core.setOutput("prerelease_tag", prereleaseTag);

      - name: Remove existing prereleases
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const prereleases = releases.filter((release) => release.prerelease);
            for (const release of prereleases) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });

              if (release.tag_name) {
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `tags/${release.tag_name}`,
                  });
                } catch (error) {
                  if (error.status !== 404) {
                    throw error;
                  }
                }
              }
            }

            core.info(`Removed ${prereleases.length} existing prerelease(s).`);

      - name: Publish GitHub release
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_KIND: ${{ steps.release_meta.outputs.kind }}
          STABLE_TAG: ${{ steps.release_meta.outputs.stable_tag }}
          PRERELEASE_TAG: ${{ steps.release_meta.outputs.prerelease_tag }}
          ARCHIVE_NAME: ${{ steps.package.outputs.archive_name }}
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.version }}
          UPSTREAM_SHA: ${{ steps.upstream.outputs.sha }}
        run: |
          NOTES_FILE="$(mktemp)"
          {
            echo "OpenClaw 简体中文语言包自动构建"
            echo ""
            echo "- Upstream version: ${UPSTREAM_VERSION}"
            echo "- Upstream commit: ${UPSTREAM_SHA}"
            echo "- Patch commit: ${GITHUB_SHA}"
            echo "- Applied replacements: ${{ steps.apply.outputs.applied }}"
            echo "- Already present: ${{ steps.apply.outputs.existed }}"
            echo "- Artifact: ${ARCHIVE_NAME}"
          } > "$NOTES_FILE"

          if [ "$RELEASE_KIND" = "release" ]; then
            gh release create "$STABLE_TAG" "$ARCHIVE_NAME" \
              --title "OpenClaw ZH v${UPSTREAM_VERSION}" \
              --notes-file "$NOTES_FILE" \
              --target "$GITHUB_SHA" \
              --latest
            echo "release_label=Release" >> "$GITHUB_ENV"
            echo "release_tag=$STABLE_TAG" >> "$GITHUB_ENV"
          else
            gh release create "$PRERELEASE_TAG" "$ARCHIVE_NAME" \
              --title "OpenClaw ZH Pre-release v${UPSTREAM_VERSION} (${UPSTREAM_SHA})" \
              --notes-file "$NOTES_FILE" \
              --target "$GITHUB_SHA" \
              --prerelease \
              --latest
            echo "release_label=Pre-release" >> "$GITHUB_ENV"
            echo "release_tag=$PRERELEASE_TAG" >> "$GITHUB_ENV"
          fi

      - name: Build summary
        run: |
          {
            echo "## Build Summary"
            echo ""
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Upstream version | ${{ steps.upstream.outputs.version }} |"
            echo "| Upstream ref | ${{ steps.upstream.outputs.ref }} |"
            echo "| Upstream commit | ${{ steps.upstream.outputs.sha }} |"
            echo "| Applied replacements | ${{ steps.apply.outputs.applied }} |"
            echo "| Already present | ${{ steps.apply.outputs.existed }} |"
            echo "| Unmatched | ${{ steps.apply.outputs.failed }} |"
            echo "| Runtime package name | openclaw |"
            if [ "${{ github.event_name }}" != "pull_request" ]; then
              echo "| Release channel | ${release_label:-not-created} |"
              echo "| Release tag | ${release_tag:-n/a} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
